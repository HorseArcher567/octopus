syntax = "proto3";
package greeter;
option go_package = "github.com/k8s-practice/octopus/example/simple/proto/greeter";

service Greeter {
  rpc Hello (HelloRequest) returns (HelloResponse) {}
  rpc Bibi (HelloRequest) returns (HelloResponse) {}
}

message HelloRequest {}

message HelloResponse {
  string message = 1;
}