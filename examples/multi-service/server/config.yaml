# Multi-Service Demo 配置文件

# 日志配置
logger:
  level: debug          # 日志级别: debug/info/warn/error (默认: info)
  format: json          # 日志格式: json/text (默认: text)
  addSource: true      # 是否添加源码位置 (文件名、行号)
  output: ./logs/server.log        # 输出目标: stdout/stderr/文件路径 (默认: stdout)
  maxAge: 7            # 日志保留天数 (仅文件输出有效), 0 表示不删除

# etcd 配置
etcd:
  endpoints:            # etcd 节点地址列表
    - localhost:2379
    - localhost:2381
    - localhost:2383
  dialTimeout: 5s       # 连接超时时间 (默认 5s)
  autoSyncInterval: 60s # 自动同步集群成员间隔 (默认 60s)
  username: "root"        # etcd 用户名 (可选)
  password: "123456"        # etcd 密码 (可选)
  

# RPC 服务器配置
rpcServer:
  name: multi-service-demo
  host: 0.0.0.0
  port: 9001
  enableReflection: true
  advertiseAddr: 127.0.0.1

  keepalive:
    serverParameters:
      maxConnectionIdle: 0s         # 0 = 不限制
      maxConnectionAge: 0s          # 0 = 不限制
      maxConnectionAgeGrace: 0s     # 0 = 不限制
      time: 2h                      # 服务端多久没活动就 ping 客户端（不配走默认 2h）
      timeout: 20s                  # ping 之后等多久没响应就关连接（不配走默认 20s）

    enforcementPolicy:
      minTime: 10s                  # 客户端两次 ping 的最小间隔（覆盖 gRPC 默认 5m）
      permitWithoutStream: true     # 是否允许无 stream 时 ping

# RPC 客户端选项配置
rpcClientOptions:
  loadBalancingPolicy: round_robin

  keepalive:
    time: 30s                       # 客户端多久没活动就 ping 服务端
    timeout: 3s                     # ping 后等待响应的超时（可选，不写走默认 20s）
    permitWithoutStream: true       # 是否允许无活跃流时也发送 ping

# HTTP API 服务器配置
apiServer:
  name: multi-service-demo     # 服务名称
  host: 0.0.0.0                # HTTP 监听地址
  port: 8090                   # HTTP 监听端口
  mode: release                # Gin 模式: debug/release
  enablePProf: false           # 是否启用 pprof

# 数据库配置
database:
  dsn: "root:123456@tcp(localhost:3306)/octopus?charset=utf8mb4&parseTime=True&loc=Local"
  driverName: "mysql"
  maxOpenConns: 100
  maxIdleConns: 10
  connMaxLifetime: 3600  # seconds (1 hour)
  connMaxIdleTime: 600   # seconds (10 minutes)

